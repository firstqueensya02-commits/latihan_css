<!DOCTYPE html>
<html>
<head>
  <title>Lesson 2</title>
<u>lesson 2 exercises - CSS basics</u>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    .uber {
      background-color: black;
      color: white;
      border: none;
      padding: 10px 20px;
    }

    .amazon {
      background-color: rgb(255, 216, 20);
      border: none;
      padding: 10px 25px;
      border-radius: 20px;
    }

    .github {
      background-color: rgb(46, 164, 79);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: bold;
    }

    .get {
      background-color: rgb(121, 82, 179);
      color: white;
      border: none;
      padding: 10px 20px;
    }

    .download {
      background-color: white;
      border: 1px solid gray;
      padding: 10px 20px;
    }

    .apply {
      background-color: rgb(10, 102, 194);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
    }

    .save {
      background-color: white;
      border: 1px solid rgb(10, 102, 194);
      color: rgb(10, 102, 194);
      padding: 10px 20px;
      border-radius: 20px;
    }

    .back {
      color: rgb(0, 113, 133);
    }

    .judul {
      font-size: 24px;
      font-weight: bold;
    }

    .harga {
      color: green;
      font-weight: bold;
    }

    .cart {
      background-color: rgb(255, 216, 20);
      border: none;
      padding: 8px 15px;
      border-radius: 20px;
    }

    .buy {
      background-color: orange;
      border: none;
      padding: 8px 15px;
      border-radius: 20px;
    }
  </style>
</head>

<body>

    <br>
    <hr>

    <p>2a. Uber</p>
    <button class="uber">Request now</button><br><br>

    <p>2b. Amazon</p>
  <button class="amazon">Add to Cart</button><br><br>

    <p>2c. GitHub</p>
  <button class="github">Sign up</button><br><br>

  <p>2d. Bootstrap</p>
  <button class="get">Get started</button>
  <button class="download">Download</button><br><br>

  <p>Linkedln</p>
  <button class="apply">Apply on company website</button>
  <button class="save">Save</button>

  <hr>

  <p>2f</p>
  <a href="#" class="back">Back to Amazon</a>

  <p class="judul">Nike Black Running Shoes</p>
  <p class="harga">$39 - in stock.</p>
  <p>Free delivery tomorrow.</p>

  <button class="cart">Add to Cart</button>
  <button class="buy">Buy now</button>

</body>
</html>
